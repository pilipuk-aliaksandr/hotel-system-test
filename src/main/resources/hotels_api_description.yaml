openapi: 3.0.4
info:
  title: Hotel Management API
  description: API for managing hotels, amenities, and searching with histograms.
  version: 1.0.0

servers:
  - url: http://localhost:8092/property-view
    description: Local development server

paths:
  /hotels:
    post:
      tags:
        - Hotel
      summary: Create a new hotel
      description: Add a new hotel in the system. Returns brief information of the created hotel
      operationId: createHotel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HotelWriteDto'
      responses:
        '201':
          description: Hotel created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HotelBriefDto'

    get:
      tags:
        - Hotel
      summary: Get all hotels
      description: Returns a list of all hotels with brief information (ID, name, description, address, and phone)
      operationId: getHotels
      responses:
        '200':
          description: A list of hotels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HotelBriefDto'

  /hotels/{id}:
    get:
      tags:
        - Hotel
      summary: Get one hotel by ID
      description: Returns the specific hotel with full information (ID, name, description, address details, contacts, arrival times, list of amenities)
      operationId: getHotelById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            example: 1
      responses:
        '200':
          description: Detailed hotel information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HotelFullDto'

  /hotels/{id}/amenities:
    post:
      tags:
        - Hotel
      summary: Add amenities to a hotel
      description: Add a list of amenity names to one hotel
      operationId: addAmenitiesToHotel
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AmenityWriteDto'
            example: [
              "Free parking",
              "Free WiFi",
              "Non-smoking rooms",
              "Concierge",
              "On-site restaurant",
              "Fitness center",
              "Pet-friendly rooms",
              "Room service",
              "Business center",
              "Meeting rooms"
            ]
      responses:
        '201':
          description: Amenities added successfully

  /search:
    get:
      tags:
        - Hotel
      summary: Search hotels by parameters
      description: Filter hotels by name, brand, city, country or specific amenities. Returns brief information for matching hotels
      operationId: searchHotels
      parameters:
        - name: name
          in: query
          schema:
            type: string
            example: "DoubleTree by Hilton Minsk"
        - name: brand
          in: query
          schema:
            type: string
            example: "Hilton"
        - name: city
          in: query
          schema:
            type: string
            example: "Minsk"
        - name: country
          in: query
          schema:
            type: string
            example: "Belarus"
        - name: amenities
          in: query
          schema:
            type: array
            items:
              type: string
              example: [
                "Free parking",
                "Free WiFi",
                "Non-smoking rooms",
                "Concierge",
                "On-site restaurant",
                "Fitness center",
                "Pet-friendly rooms",
                "Room service",
                "Business center",
                "Meeting rooms"
              ]
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HotelBriefDto'

  /histogram/{param}:
    get:
      tags:
        - Hotel
      summary: Get hotel statistics (histogram)
      description: Returns a list of hotel counts grouped by the specified parameter (brand, city, country or amenity)
      operationId: getHistogramHotels
      parameters:
        - name: param
          in: path
          required: true
          schema:
            type: string
            enum: [ brand, city, country, amenities ]
            example: "city"
      responses:
        '200':
          description: Histogram data
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: integer
                  example:
                    "Minsk": 1
                    "Moscow": 2
                    "Mogilev": 1

components:
  schemas:
    HotelBriefDto:
      type: object
      required: [ id, name, description, address, phone ]
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: "DoubleTree by Hilton Minsk"
        description:
          type: string
          example: "The DoubleTree by Hilton Hotel Minsk offers 193 luxurious rooms..."
        address:
          type: string
          example: "9 Pobediteley Avenue, Minsk, 220004, Belarus"
        phone:
          type: string
          example: "+375 17 309-80-00"

    HotelFullDto:
      type: object
      required: [ id, name, description, brand, address, contacts, arrivalTime, amenities ]
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: "DoubleTree by Hilton Minsk"
        description:
          type: string
          example: "The DoubleTree by Hilton Hotel Minsk offers 193 luxurious rooms..."
        brand:
          type: string
          example: "Hilton"
        address:
          $ref: '#/components/schemas/AddressDto'
        contacts:
          $ref: '#/components/schemas/ContactsDto'
        arrivalTime:
          $ref: '#/components/schemas/ArrivalTimeDto'
        amenities:
          type: array
          items:
            type: string
          example: [
            "Free parking",
            "Free WiFi",
            "Non-smoking rooms",
            "Concierge",
            "On-site restaurant",
            "Fitness center",
            "Pet-friendly rooms",
            "Room service",
            "Business center",
            "Meeting rooms"
          ]

    HotelWriteDto:
      type: object
      required: [ name, brand, address, contacts, arrivalTime ]
      properties:
        name:
          type: string
          example: "DoubleTree by Hilton Minsk"
        description:
          type: string
          example: "The DoubleTree by Hilton Hotel Minsk offers 193 luxurious rooms..."
        brand:
          type: string
          example: "Hilton"
        address:
          $ref: '#/components/schemas/AddressDto'
        contacts:
          $ref: '#/components/schemas/ContactsDto'
        arrivalTime:
          $ref: '#/components/schemas/ArrivalTimeDto'

    AddressDto:
      type: object
      required: [ houseNumber, street, city, country, postCode ]
      properties:
        houseNumber:
          type: integer
          format: int32
          example: 9
        street:
          type: string
          example: "Pobediteley Avenue"
        city:
          type: string
          example: "Minsk"
        country:
          type: string
          example: "Belarus"
        postCode:
          type: string
          example: "220004"

    ContactsDto:
      type: object
      required: [ phone, email ]
      properties:
        phone:
          type: string
          example: "+375 17 309-80-00"
        email:
          type: string
          example: "doubletreeminsk.info@hilton.com"

    ArrivalTimeDto:
      type: object
      required: [ checkIn, checkOut ]
      properties:
        checkIn:
          type: string
          example: "14:00"
        checkOut:
          type: string
          example: "12:00"

    AmenityWriteDto:
      type: array
      items:
        type: string
        example: [
          "Free parking",
          "Free WiFi",
          "Non-smoking rooms",
          "Concierge",
          "On-site restaurant",
          "Fitness center",
          "Pet-friendly rooms",
          "Room service",
          "Business center",
          "Meeting rooms"
        ]