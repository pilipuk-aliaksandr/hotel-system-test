spring:
  datasource:
    url: jdbc:h2:mem:hoteldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

test:
  sql:
    disable-constraints: SET REFERENTIAL_INTEGRITY FALSE
    enable-constraints: SET REFERENTIAL_INTEGRITY TRUE
    truncate-table: TRUNCATE TABLE %s RESTART IDENTITY